name: Generate Geopolitical Carousel

on:
  schedule:
    - cron: "0 1 * * *"   # 06:00 PKT
    - cron: "0 13 * * *"  # 18:00 PKT
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔤 Download fonts
        run: |
          mkdir -p fonts
          curl -fsSL \
            "https://github.com/google/fonts/raw/main/ofl/playfairdisplay/PlayfairDisplay-Bold.ttf" \
            -o fonts/PlayfairDisplay-Bold.ttf && echo "✅ PlayfairDisplay-Bold downloaded" \
            || echo "⚠️  Font download failed — using fallback"
          curl -fsSL \
            "https://github.com/google/fonts/raw/main/ofl/sourceserif4/SourceSerif4%5Bopsz%2Cwght%5D.ttf" \
            -o fonts/SourceSerif4-Regular.ttf && echo "✅ SourceSerif4 downloaded" \
            || echo "⚠️  Font download failed — using fallback"

      - name: 🤖 Run bot
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          CLOUDINARY_CLOUD_NAME:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:     ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:  ${{ secrets.CLOUDINARY_API_SECRET }}
          GOOGLE_SHEET_ID:        ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON:      ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python src/bot.py

      - name: 📤 Upload slides as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: carousel-slides
          path: output/
          retention-days: 7

      - name: 📣 Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -fsSL -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"🚨 GeopoliticsBot failed on $(date -u '+%Y-%m-%d %H:%M UTC'). Check Actions logs.\"}"
          fi
